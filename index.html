<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ─────────────────────────────────────────────────── -->
    <title>OfferAdvisor — AI Offer Negotiation Coach</title>
    <meta name="description" content="Negotiate your job offer with confidence — or benchmark your first role as a student. OfferAdvisor offers AI coaching, salary benchmarking, counter-offer strategy, recruiter role-play, and a Students hub with paths exploration plus university verification for campus partners." />
    <meta name="keywords" content="salary negotiation, job offer, first job offer, new grad salary, university career services, salary benchmark, AI coach, compensation, counter offer" />
    <meta name="author" content="OfferAdvisor" />
    <meta name="theme-color" content="#1d4ed8" />

    <!-- ── Favicon — inline SVG as data URI for maximum compatibility ───── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://offeradvisor.ai/" />
    <meta property="og:title" content="OfferAdvisor — AI Offer Negotiation Coach" />
    <meta property="og:description" content="Professional negotiation coaching powered by AI — plus tools for students and new grads: benchmarks, compare offers, career paths, and campus verification when your university partners with OfferAdvisor." />
    <meta property="og:image" content="https://offeradvisor.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="OfferAdvisor — AI Offer Negotiation Coach" />
    <meta property="og:site_name" content="OfferAdvisor" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@offeradvisor" />
    <meta name="twitter:title" content="OfferAdvisor — AI Offer Negotiation Coach" />
    <meta name="twitter:description" content="Benchmark your offer. Explore student paths. Practice with AI. Universities can onboard verified students." />
    <meta name="twitter:image" content="https://offeradvisor.ai/og-image.png" />
    <meta name="twitter:image:alt" content="OfferAdvisor AI Offer Coach" />

    <!-- ── Canonical ─────────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://offeradvisor.ai/" />

    <!-- ── PWA manifest ──────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Fonts — preconnect for speed ─────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured data (Google rich results) ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "OfferAdvisor",
      "url": "https://offeradvisor.ai",
      "description": "AI-powered job offer negotiation coach with a Students hub for first offers, paths, and university verification.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Student Plus",
          "price": "24",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Offer Sprint",
          "price": "29",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Offer in Hand",
          "price": "49",
          "priceCurrency": "USD"
        }
      ]
    }
    </script>

    <!-- ── Inline critical CSS — prevents flash of unstyled content ──────── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background: #0a0f1a;
        color: #e2e8f0;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { display: flex; flex-direction: column; min-height: 100vh; }
      /* Loading spinner shown before React mounts */
      #app-loader {
        position: fixed; inset: 0;
        background: #0a0f1a;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-mark {
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      .loader-logo {
        width: 48px; height: 48px; border-radius: 14px;
        background: #1d4ed8;
        display: flex; align-items: center; justify-content: center;
        animation: pulse-logo 1.6s ease-in-out infinite;
      }
      .loader-wordmark {
        font-family: 'DM Sans', sans-serif;
        font-weight: 600; font-size: 1.1rem;
        color: #e2e8f0; letter-spacing: -0.01em;
      }
      .loader-wordmark span { color: #3b82f6; }
      .loader-sub {
        font-size: 0.72rem; color: #475569;
        letter-spacing: 0.08em; text-transform: uppercase;
      }
      @keyframes pulse-logo {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.8; transform: scale(0.96); }
      }
    </style>
  </head>

  <body>
    <!-- Loading state shown while React bundle loads -->
    <div id="app-loader">
      <div class="loader-mark">
        <div class="loader-logo">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M8 22 L16 10 L24 22" stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="16" cy="10" r="2.4" fill="#60a5fa"/>
            <line x1="10" y1="25" x2="22" y2="25" stroke="white"
              stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
          </svg>
        </div>
        <div class="loader-wordmark">Offer<span>Advisor</span></div>
        <div class="loader-sub">AI Offer Coach</div>
      </div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide loader once React has painted -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('app-loader');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(function () { loader.remove(); }, 350);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
